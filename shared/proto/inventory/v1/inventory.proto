syntax = "proto3";

package inventory.v1;
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Steadypim/rocket-factory/workspace/shared/pkg/proto/inventory/v1;inventory_v1";

service InventoryService {
    // GetPart возвращает информацию о детали по ее UUID
    rpc GetPart(GetPartRequest) returns (GetPartResponse);
    rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
}

// Part деталь
message Part {
    // Уникальный идентификатор детали
    string uuid = 1;

    // Название детали
    string name = 2;

    // Описание детали
    string description = 3;

    // Цена за единицу
    double price = 4;

    // Количество на складе
    int64 stock_quantity = 5;

    // Категория
    Category category = 6;

    // Размеры
    Dimensions dimensions = 7;

    // Производитель
    Manufacturer manufacturer = 8;

    // Теги для быстрого поиска
    repeated string tags = 9;

    // Гибкие метаданные
    map<string, Value> metadata = 10;

    // Дата создания
    google.protobuf.Timestamp created_at = 11;

    // Дата обновления
    google.protobuf.Timestamp updated_at = 12;
}

// Category категория детали
enum Category {
    UNKNOWN = 0;
    ENGINE = 1;
    FUEL = 2;
    PORTHOLE = 3;
    WING = 4;
}

// Dimensions размеры детали
message Dimensions {
    // length длина
    double length = 1;
    
    // width ширина
    double width = 2;
    
    // height высота
    double height = 3;
    
    // weight вес
    double weight = 4;
}

// Manufacturer производитель
message Manufacturer {
    // name название производителя
    string name = 1;
    
    // country страна производителя
    string country = 2;
    
    // website веб-сайт производителя
    string website = 3;
}

// Value значение
message Value {
    oneof value {
        // string_value строковое значение
        string string_value = 1;
        // int64_value целое значение
        int64 int64_value = 2;
        // double_value дробное значение
        double double_value = 3;
        // bool_value логическое значение
        bool bool_value = 4;
    }
}

// GetPartRequest запрос на получение детали по UUID
message GetPartRequest {
    // uuid уникальный идентификатор детали
    string uuid = 1;
}

// GetPartResponse ответ на запрос на получение детали по UUID
message GetPartResponse {
    // part деталь
    Part part = 1;
}

// PartsFilter фильтр по деталям (все поля опциональны)
message PartsFilter {
    repeated string uuids = 1;
    repeated string names = 2;
    repeated Category categories = 3;
    repeated string manufacturer_countries = 4;
    repeated string tags = 5;
}

// ListPartsRequest запрос на получение списка деталей
message ListPartsRequest {
    repeated string uuids = 1;
    repeated string names = 2;
    repeated Category categories = 3;
    repeated string manufacturer_countries = 4;
    repeated string tags = 5;
    PartsFilter filter = 6;
}

// ListPartsResponse ответ на запрос на получение списка деталей
message ListPartsResponse {
    // parts список деталей
    repeated Part parts = 1;
}

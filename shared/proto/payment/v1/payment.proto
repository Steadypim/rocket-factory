syntax = "proto3";

package payment.v1;

option go_package = "github.com/Steadypim/rocket-factory/workspace/shared/pkg/proto/payment/v1;payment_v1";

// PaymentService обрабатывает оплату заказов.
service PaymentService {
  // PayOrder выполняет оплату заказа и возвращает UUID транзакции.
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// PaymentMethod способ оплаты заказа.
enum PaymentMethod {
  // PAYMENT_METHOD_UNKNOWN неизвестный способ оплаты.
  PAYMENT_METHOD_UNKNOWN = 0;
  // PAYMENT_METHOD_CARD оплата банковской картой.
  PAYMENT_METHOD_CARD = 1;
  // PAYMENT_METHOD_SBP оплата через систему быстрых платежей.
  PAYMENT_METHOD_SBP = 2;
  // PAYMENT_METHOD_CREDIT_CARD оплата кредитной картой.
  PAYMENT_METHOD_CREDIT_CARD = 3;
  // PAYMENT_METHOD_INVESTOR_MONEY оплата деньгами инвестора.
  PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// PayOrderRequest запрос на оплату заказа.
message PayOrderRequest {
  // order_uuid UUID заказа.
  string order_uuid = 1;
  // user_uuid UUID пользователя, который инициирует оплату.
  string user_uuid = 2;
  // payment_method выбранный способ оплаты.
  PaymentMethod payment_method = 3;
}

// PayOrderResponse ответ с UUID транзакции оплаты.
message PayOrderResponse {
  // transaction_uuid UUID транзакции оплаты.
  string transaction_uuid = 1;
}

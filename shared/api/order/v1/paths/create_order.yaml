post:
  summary: Create order
  operationId: CreateOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components.openapi.yaml#/components/schemas/CreateOrderRequest
  responses:
    '200':
      description: Order successfully created
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/CreatedOrder
    '400':
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/BadRequestError
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/InternalServerError
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/GenericError

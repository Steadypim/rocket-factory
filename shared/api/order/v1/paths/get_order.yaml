parameters:
  - $ref: ../params/order_uuid.yaml

get:
  summary: Get order by UUID
  description: Retrieve an order by its UUID
  operationId: GetOrder
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/Order
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/NotFoundError
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/InternalServerError
    'default':
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/GenericError

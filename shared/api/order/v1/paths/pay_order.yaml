parameters:
  - $ref: ../params/order_uuid.yaml
    
post:
  summary: Pay order
  operationId: PayOrder
  tags:
    - Order
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components.openapi.yaml#/components/schemas/PayOrderRequest
  responses:
    '200':
      description: Order successfully paid
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/OrderPayment
    '400':
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/BadRequestError
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/NotFoundError
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/InternalServerError
    default:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: ../components.openapi.yaml#/components/schemas/GenericError
